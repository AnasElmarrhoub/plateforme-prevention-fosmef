version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fosmef-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: prevention_db
      POSTGRES_USER: fosmef_user
      POSTGRES_PASSWORD: fosmef_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fosmef-network

volumes:
  postgres_data:

networks:
  fosmef-network:
    driver: bridge